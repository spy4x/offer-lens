<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfferLens</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body class="dark">
    <div id="app">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <span class="logo">&#128269; OfferLens</span>
        </div>
        <div class="header-right">
          <span id="demoCounter" class="demo-counter">&#128202; --/50</span>
          <button id="settingsBtn" class="btn-icon" title="Settings">&#9881;</button>
        </div>
      </header>

      <!-- Settings Panel (hidden by default) -->
      <div id="settingsPanel" class="settings-panel hidden">
        <label class="field">
          <span>API Key (optional)</span>
          <input type="password" id="apiKeyInput" placeholder="sk-..." class="input">
        </label>
        <label class="field checkbox-field">
          <input type="checkbox" id="useDemoKeyToggle" checked>
          <span>Use Demo Key (50 free analyses)</span>
        </label>
        <label class="field">
          <span>Backend URL</span>
          <input type="text" id="backendUrlInput" value="http://localhost:8000" class="input">
        </label>
        <div class="settings-actions">
          <button id="saveSettingsBtn" class="btn btn-primary">Save</button>
          <button id="closeSettingsBtn" class="btn btn-secondary">Cancel</button>
        </div>
      </div>

      <!-- Single URL Mode -->
      <div id="singleMode" class="mode">
        <div class="url-display">
          <span class="url-label">Current page:</span>
          <span id="currentUrl" class="url-text">Loading...</span>
        </div>
        <button id="analyzeBtn" class="btn btn-primary btn-full">&#128270; Analyze Page</button>
      </div>

      <!-- Batch Mode (hidden by default) -->
      <div id="batchMode" class="mode hidden">
        <label class="field">
          <span>URLs (one per line, max 50)</span>
          <textarea id="batchUrls" class="textarea" rows="6"
            placeholder="https://example.com/offer1&#10;https://example.com/offer2&#10;..."></textarea>
        </label>
        <button id="batchAnalyzeBtn" class="btn btn-primary btn-full">&#128270; Analyze All</button>
      </div>

      <!-- Mode Toggle -->
      <div class="mode-toggle">
        <button id="singleModeTab" class="tab active">Single URL</button>
        <button id="batchModeTab" class="tab">&#128230; Batch</button>
      </div>

      <!-- Loading State -->
      <div id="loadingState" class="loading hidden">
        <div class="spinner"></div>
        <p>Analyzing page... (2-5s)</p>
      </div>

      <!-- Error State -->
      <div id="errorState" class="error hidden">
        <p id="errorMessage"></p>
        <button id="retryBtn" class="btn btn-secondary">Try Again</button>
      </div>

      <!-- Analysis Results -->
      <div id="results" class="results hidden"></div>

      <!-- Footer -->
      <footer class="footer">
        <span>OfferLens v1.0 &middot; It's Today Media</span>
      </footer>
    </div>

    <script src="build/sidepanel.js"></script>
  </body>
</html>
